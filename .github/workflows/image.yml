# Builds the Estranged.Lfs.Hosting.Web container image and publishes it
# to GHCR. We host this image on GHCR (not our in-cluster harbor)
# specifically because it's a chicken-and-egg dependency: the cluster
# pulls this image to bring up the LFS server that the appmana monorepo
# needs at clone time, so the image cannot live behind cluster infra.
name: image

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "hosting/Estranged.Lfs.Hosting.Web/**"
      - ".github/workflows/image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/estranged-lfs
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: hosting/Estranged.Lfs.Hosting.Web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
